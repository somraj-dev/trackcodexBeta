<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Completing sign in...</title>
  <script>
    // Google/GitHub redirect to /auth/callback/google or /auth/callback/github (real paths)
    // but the app uses HashRouter (#). This bridge page grabs the query params and
    // redirects to /#/auth/callback/[provider]?... so React Router can handle it.
    (function () {
      var path = window.location.pathname; // e.g. /auth/callback/google
      var search = window.location.search; // e.g. ?code=...&state=...
      // Extract provider from path: /auth/callback/google -> google
      var match = path.match(/\/auth\/callback\/(\w+)/);
      var provider = match ? match[1] : "google";
      // Redirect to hash-based route
      window.location.replace("/#/auth/callback/" + provider + search);
    })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:40vh;color:#888">
    Completing sign in, please wait...
  </p>
</body>
</html>
