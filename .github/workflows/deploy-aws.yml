name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_BACKEND_REPO: trackcodex-backend
  ECR_IDE_REPO: trackcodex-ide
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ─── 2. Configure AWS credentials ───────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ─── 3. Login to Amazon ECR ─────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ─── 4. Build & Push Backend Docker image ───────────────────────────────
      - name: Build Backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -f backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:latest \
            .

      - name: Push Backend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest

      # ─── 5. Build & Push IDE Docker image ───────────────────────────────────
      - name: Build IDE image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -f infrastructure/docker/ide.Dockerfile \
            -t $ECR_REGISTRY/$ECR_IDE_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_IDE_REPO:latest \
            .

      - name: Push IDE image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_IDE_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_IDE_REPO:latest

      # ─── 6. Deploy to ECS ────────────────────────────────────────────────────
      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service --cluster trackcodex-cluster --service trackcodex-service --force-new-deployment --region $AWS_REGION

      - name: Verify Deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "✅ Deployment triggered!"
          echo "   Backend: $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG"
          echo "   IDE:     $ECR_REGISTRY/$ECR_IDE_REPO:$IMAGE_TAG"
          echo "The ECS service will now pull the 'latest' images from ECR."
