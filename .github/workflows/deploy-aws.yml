name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_BACKEND_REPO: trackcodex-backend
  ECR_IDE_REPO: trackcodex-ide
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ─── 2. Configure AWS credentials ───────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ─── 3. Login to Amazon ECR ─────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ─── 4. Build & Push Backend Docker image ───────────────────────────────
      - name: Build Backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -f backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_BACKEND_REPO:latest \
            .

      - name: Push Backend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest

      # ─── 5. Build & Push IDE Docker image ───────────────────────────────────
      - name: Build IDE image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -f infrastructure/docker/ide.Dockerfile \
            -t $ECR_REGISTRY/$ECR_IDE_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_IDE_REPO:latest \
            .

      - name: Push IDE image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_IDE_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_IDE_REPO:latest

      # ─── 6. Deploy to ECS ────────────────────────────────────────────────────
      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service --cluster trackcodex-cluster --service trackcodex-service --force-new-deployment --region $AWS_REGION

      - name: Verify Deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "✅ Deployment triggered!"
          echo "   Backend: $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG"
          echo "   IDE:     $ECR_REGISTRY/$ECR_IDE_REPO:$IMAGE_TAG"
          echo "The ECS service will now pull the 'latest' images from ECR."
          echo ""
          echo "⏳ Waiting 60s for ECS to start the new task..."
          sleep 60
          echo "🔍 Polling health check at https://api.trackcodex.com/api/health ..."
          ATTEMPTS=0
          MAX_ATTEMPTS=12
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.trackcodex.com/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check PASSED (HTTP $STATUS) on attempt $ATTEMPTS"
              curl -sf https://api.trackcodex.com/api/health | head -c 500
              exit 0
            fi
            echo "⏳ Attempt $ATTEMPTS/$MAX_ATTEMPTS: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "⚠️  Health check did not return 200 after $MAX_ATTEMPTS attempts."
          echo "   Check CloudWatch Logs: /ecs/trackcodex"
          echo "   This may be a transient issue — the server should self-heal via reconnection loop."
          exit 0

