# ─────────────────────────────────────────────────────────────
# TrackCodex — Production Docker Compose (AWS EC2)
# Place this at /opt/trackcodex/docker-compose.prod.yml on EC2
# ─────────────────────────────────────────────────────────────

services:
  backend:
    # This image tag is updated automatically by GitHub Actions on each deploy
    image: 275142546612.dkr.ecr.ap-south-1.amazonaws.com/trackcodex-backend:latest
    container_name: trackcodex-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env.prod          # lives at /opt/trackcodex/.env.prod (never commit this)
    environment:
      NODE_ENV: production
    volumes:
      - /opt/trackcodex/data:/app/data          # Persistent storage for general data
      - /opt/trackcodex/workspaces:/app/workspaces  # Shared with IDE container
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ide:
    image: 275142546612.dkr.ecr.ap-south-1.amazonaws.com/trackcodex-ide:latest
    container_name: trackcodex-ide
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /opt/trackcodex/workspaces:/home/workspace   # Same host dir as backend
    environment:
      CONNECTION_TOKEN: trackcodex
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: trackcodex-net
