# ─────────────────────────────────────────────────────────────
# Nginx Reverse Proxy Config for TrackCodex EC2 Backend
# Place this at /etc/nginx/sites-available/trackcodex
# Then: sudo ln -s /etc/nginx/sites-available/trackcodex /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# ─── HTTP (redirects to HTTPS after certbot) ──────────────────
server {
    listen 80;
    server_name api.trackcodex.com;

    # Certbot will add HTTPS redirect here automatically
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket / Socket.io support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    300s;   # Long for streaming/terminal

        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;
    }
}

# ─── HTTPS (auto-filled by Certbot) ──────────────────────────
# Certbot will create a second server block here for port 443
# Run: sudo certbot --nginx -d api.trackcodex.com
